<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REscript Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #0f172a 0%, #1e40af 50%, #7c3aed 100%);
            padding: 28px 24px;
            text-align: center;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 700;
        }

        .header .meta {
            color: #93c5fd;
            font-size: 14px;
            margin-top: 6px;
        }

        .header .stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 14px;
            flex-wrap: wrap;
        }

        .header .stat {
            text-align: center;
        }

        .header .stat-val {
            font-size: 26px;
            font-weight: 800;
        }

        .header .stat-lbl {
            font-size: 10px;
            color: #93c5fd;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px 16px;
        }

        /* Module category tabs */
        .cat-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
            overflow-x: auto;
            flex-wrap: wrap;
        }

        .cat-tab {
            padding: 6px 14px;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid #334155;
            background: #1e293b;
            color: #94a3b8;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .cat-tab:hover {
            border-color: #60a5fa;
            color: #e2e8f0;
        }

        .cat-tab.active {
            background: #7c3aed;
            color: white;
            border-color: #7c3aed;
        }

        /* Style filter tabs */
        .tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 20px;
            overflow-x: auto;
            flex-wrap: wrap;
        }

        .tab {
            padding: 6px 14px;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid #334155;
            background: #1e293b;
            color: #94a3b8;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .tab:hover {
            border-color: #60a5fa;
            color: #e2e8f0;
        }

        .tab.active {
            background: #3b82f6;
            color: white;
            border-color: #3b82f6;
        }

        .module-section {
            margin-bottom: 28px;
        }

        .module-label {
            font-size: 14px;
            font-weight: 600;
            color: #a78bfa;
            padding: 8px 0;
            border-bottom: 1px solid #334155;
            margin-bottom: 12px;
        }

        .article-section {
            margin-bottom: 20px;
        }

        .article-header {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 10px 10px 0 0;
            padding: 14px 16px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .article-num {
            background: #3b82f6;
            color: white;
            width: 26px;
            height: 26px;
            border-radius: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .article-info {
            flex: 1;
        }

        .article-title {
            font-size: 14px;
            font-weight: 600;
            color: #f1f5f9;
            line-height: 1.4;
        }

        .article-source {
            font-size: 11px;
            color: #64748b;
            margin-top: 3px;
        }

        .article-source a {
            color: #60a5fa;
            text-decoration: none;
        }

        .script-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-top: none;
            padding: 16px;
        }

        .script-card:last-child {
            border-radius: 0 0 10px 10px;
        }

        .script-card.hidden {
            display: none;
        }

        .hidden {
            display: none !important;
        }

        .card-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 6px;
        }

        .card-badges {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }

        .badge {
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 500;
        }

        .badge-professional {
            background: #1d4ed820;
            color: #60a5fa;
            border: 1px solid #1d4ed840;
        }

        .badge-casual {
            background: #a855f720;
            color: #c084fc;
            border: 1px solid #a855f740;
        }

        .badge-investor {
            background: #f59e0b20;
            color: #fbbf24;
            border: 1px solid #f59e0b40;
        }

        .badge-mythbuster {
            background: #ef444420;
            color: #f87171;
            border: 1px solid #ef444440;
        }

        .badge-platform {
            background: #06b6d420;
            color: #67e8f9;
            border: 1px solid #06b6d440;
        }

        .badge-duration {
            background: #10b98120;
            color: #34d399;
            border: 1px solid #10b98140;
        }

        .section-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #64748b;
            margin-bottom: 4px;
            font-weight: 600;
        }

        .hook {
            font-size: 15px;
            font-weight: 600;
            color: #fbbf24;
            line-height: 1.5;
            margin-bottom: 12px;
            padding: 10px;
            background: #fbbf2408;
            border-left: 3px solid #fbbf24;
            border-radius: 0 6px 6px 0;
        }

        .content-text {
            font-size: 13px;
            color: #cbd5e1;
            line-height: 1.8;
            margin-bottom: 12px;
        }

        .cta-text {
            font-size: 13px;
            color: #34d399;
            font-weight: 500;
            line-height: 1.5;
            padding: 8px 10px;
            background: #34d39908;
            border-left: 3px solid #34d399;
            border-radius: 0 6px 6px 0;
            margin-bottom: 10px;
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-bottom: 10px;
        }

        .tag {
            padding: 2px 7px;
            background: #334155;
            color: #94a3b8;
            border-radius: 5px;
            font-size: 11px;
        }

        .card-actions {
            display: flex;
            gap: 6px;
        }

        .btn {
            padding: 6px 12px;
            border-radius: 7px;
            border: 1px solid #334155;
            background: #0f172a;
            color: #94a3b8;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .btn:hover {
            background: #334155;
            color: white;
        }

        .btn.copied {
            background: #059669;
            color: white;
            border-color: #059669;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 13px;
            z-index: 200;
            display: none;
            background: #065f46;
            color: #34d399;
            border: 1px solid #34d39940;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                transform: translate(-50%, 20px);
                opacity: 0;
            }

            to {
                transform: translate(-50%, 0);
                opacity: 1;
            }
        }

        .empty-state {
            text-align: center;
            padding: 48px 24px;
            color: #64748b;
        }

        .empty-state .icon {
            font-size: 40px;
            margin-bottom: 12px;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1 id="pageTitle">REscript daily viewer</h1>
        <div class="meta" id="dateMeta">加载中...</div>
        <div class="stats">
            <div class="stat">
                <div class="stat-val" id="newsCount">-</div>
                <div class="stat-lbl" id="newsLabel">News</div>
            </div>
            <div class="stat">
                <div class="stat-val" id="moduleCount">-</div>
                <div class="stat-lbl" id="moduleLabel">Modules</div>
            </div>
            <div class="stat">
                <div class="stat-val" id="scriptCount">-</div>
                <div class="stat-lbl" id="scriptLabel">Scripts</div>
            </div>
            <div class="stat">
                <div class="stat-val">4</div>
                <div class="stat-lbl" id="styleLabel">Angles</div>
            </div>
        </div>
    </div>
    <div class="container">
        <div class="cat-tabs" id="catTabs"></div>
        <div class="tabs">
            <div class="tab active" data-style="all" id="tabAll">All angles</div>
            <div class="tab" data-style="professional" id="tabProfessional">📊 Professional</div>
            <div class="tab" data-style="casual" id="tabCasual">😄 Casual</div>
            <div class="tab" data-style="investor" id="tabInvestor">💰 Investor</div>
            <div class="tab" data-style="mythbuster" id="tabMythbuster">🔍 Myth-buster</div>
        </div>
        <div id="content"></div>
    </div>
    <div class="toast" id="toast"></div>
    <script>
const API='/api';
let allSections=[];
let uiLanguage='en';
const copyMap={
  en:{
    pageTitle:'REscript daily viewer',
    loading:'Loading your private viewer...',
    newsLabel:'News',
    moduleLabel:'Modules',
    scriptLabel:'Scripts',
    styleLabel:'Angles',
    tabAll:'All angles',
    tabProfessional:'📊 Professional',
    tabCasual:'😄 Casual',
    tabInvestor:'💰 Investor',
    tabMythbuster:'🔍 Myth-buster',
    missingLink:'Missing access credentials. Open the private viewer link from your email.',
    invalidLink:'No scripts found for this link.',
    copyToast:'✅ Script copied',
    shareToast:'✅ Script copied for sharing',
    copiedButton:'✅ Copied',
    copyButton:'📋 Copy',
    shareButton:'🔗 Share',
    hook:'Opening hook',
    body:'Main body',
    cta:'Call to action',
    source:'Source',
    articleLink:'Read source ↗',
    dateMeta:(data)=>`📅 ${data.date} · ${data.market} · ${String(data.language).toUpperCase()}`,
    titleForDate:(date)=>`REscript viewer · ${date}`,
    newsCategory:'📰 News',
    allCategory:'All',
    loadFailed:(message)=>`Unable to load viewer: ${message}`,
  },
  zh:{
    pageTitle:'REscript 每日文案查看页',
    loading:'正在加载专属查看页...',
    newsLabel:'新闻',
    moduleLabel:'模块',
    scriptLabel:'文案',
    styleLabel:'风格',
    tabAll:'全部风格',
    tabProfessional:'📊 专业',
    tabCasual:'😄 轻松',
    tabInvestor:'💰 投资',
    tabMythbuster:'🔍 避坑',
    missingLink:'缺少访问凭证，请使用邮件中的专属链接打开。',
    invalidLink:'未找到对应文案。',
    copyToast:'✅ 文案已复制到剪贴板',
    shareToast:'✅ 文案已复制，可直接分享',
    copiedButton:'✅ 已复制',
    copyButton:'📋 复制',
    shareButton:'🔗 分享',
    hook:'开场钩子',
    body:'主要内容',
    cta:'行动号召',
    source:'来源',
    articleLink:'原文↗',
    dateMeta:(data)=>`📅 ${data.date} · ${data.market} · ${String(data.language).toUpperCase()}`,
    titleForDate:(date)=>`REscript 文案查看页 · ${date}`,
    newsCategory:'📰 新闻',
    allCategory:'全部',
    loadFailed:(message)=>`加载失败: ${message}`,
  }
};
function ui(){return copyMap[uiLanguage]||copyMap.en;}
function applyStaticCopy(){
  const c=ui();
  document.documentElement.lang=uiLanguage==='zh'?'zh-CN':'en';
  document.getElementById('pageTitle').textContent=c.pageTitle;
  document.getElementById('dateMeta').textContent=c.loading;
  document.getElementById('newsLabel').textContent=c.newsLabel;
  document.getElementById('moduleLabel').textContent=c.moduleLabel;
  document.getElementById('scriptLabel').textContent=c.scriptLabel;
  document.getElementById('styleLabel').textContent=c.styleLabel;
  document.getElementById('tabAll').textContent=c.tabAll;
  document.getElementById('tabProfessional').textContent=c.tabProfessional;
  document.getElementById('tabCasual').textContent=c.tabCasual;
  document.getElementById('tabInvestor').textContent=c.tabInvestor;
  document.getElementById('tabMythbuster').textContent=c.tabMythbuster;
}
function escapeHtml(value){return String(value).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function safeUrl(value){try{const url=new URL(value);return ['http:','https:'].includes(url.protocol)?url.toString():null;}catch{return null;}}
function showToast(message){const toast=document.getElementById('toast');toast.textContent=message;toast.style.display='block';setTimeout(()=>{toast.style.display='none';},2000);}
function getStyleName(style){
  const zh={professional:'专业分析型',casual:'轻松聊天型',investor:'投资顾问型',mythbuster:'犀利避坑型'};
  const en={professional:'Professional analysis',casual:'Casual social',investor:'Investor angle',mythbuster:'Myth-buster'};
  return (uiLanguage==='zh'?zh:en)[style]||style;
}
function buildText(article,script){
  const c=ui();
  return`🎬 ${article.title}\n\n🎯 ${c.hook}\n${script.hook}\n\n📝 ${c.body}\n${script.content}\n\n💬 ${c.cta}\n${script.cta}\n\n📱 ${script.platform} ⏱️ ${script.duration}\n🏷️ ${script.tags.join(', ')}`;
}
function copyScript(sectionIndex,articleIndex,scriptIndex){
  const section=allSections[sectionIndex];const article=section.articles[articleIndex];const script=article.scripts[scriptIndex];
  navigator.clipboard.writeText(buildText(article,script)).then(()=>{
    showToast(ui().copyToast);
    const button=document.getElementById(`cp-${sectionIndex}-${articleIndex}-${scriptIndex}`);
    if(button){button.textContent=ui().copiedButton;button.classList.add('copied');setTimeout(()=>{button.textContent=ui().copyButton;button.classList.remove('copied');},2000);}
  });
}
function shareScript(sectionIndex,articleIndex,scriptIndex){
  const section=allSections[sectionIndex];const article=section.articles[articleIndex];const script=article.scripts[scriptIndex];
  const text=buildText(article,script);
  if(navigator.share){navigator.share({title:article.title,text}).catch(()=>{});}
  else navigator.clipboard.writeText(text).then(()=>showToast(ui().shareToast));
}
function filterCat(category){
  document.querySelectorAll('.cat-tab').forEach(tab=>tab.classList.toggle('active',tab.dataset.cat===category));
  document.querySelectorAll('.module-section').forEach(section=>{if(category==='all')section.classList.remove('hidden');else section.classList.toggle('hidden',section.dataset.cat!==category);});
}
function filterStyle(style){
  document.querySelectorAll('.tab').forEach(tab=>tab.classList.toggle('active',tab.dataset.style===style));
  document.querySelectorAll('.script-card').forEach(card=>{if(style==='all')card.classList.remove('hidden');else card.classList.toggle('hidden',card.dataset.style!==style);});
}
function renderSection(section,sectionIndex){
  let html='';
  const c=ui();
  section.articles.forEach((article,articleIndex)=>{
    const link=safeUrl(article.url);
    html+=`<div class="article-section"><div class="article-header"><div class="article-num">${articleIndex+1}</div><div class="article-info"><div class="article-title">${escapeHtml(article.title)}</div><div class="article-source">${escapeHtml(article.source)}${link?` · <a href="${link}" target="_blank" rel="noopener noreferrer">${c.articleLink}</a>`:''}</div></div></div>`;
    article.scripts.forEach((script,scriptIndex)=>{
      html+=`<div class="script-card" data-style="${escapeHtml(script.style)}"><div class="card-top"><div class="card-badges"><span class="badge badge-${escapeHtml(script.style)}">${escapeHtml(script.styleName||getStyleName(script.style))}</span><span class="badge badge-platform">📱 ${escapeHtml(script.platform)}</span><span class="badge badge-duration">⏱️ ${escapeHtml(script.duration)}</span></div></div>
      <div class="section-label">🎯 ${c.hook}</div><div class="hook">${escapeHtml(script.hook)}</div>
      <div class="section-label">📝 ${c.body}</div><div class="content-text">${escapeHtml(script.content).replace(/\n/g,'<br>')}</div>
      <div class="section-label">💬 ${c.cta}</div><div class="cta-text">${escapeHtml(script.cta)}</div>
      <div class="tags">${script.tags.map(tag=>`<span class="tag">#${escapeHtml(tag)}</span>`).join('')}</div>
      <div class="card-actions"><button class="btn" id="cp-${sectionIndex}-${articleIndex}-${scriptIndex}" onclick="copyScript(${sectionIndex},${articleIndex},${scriptIndex})">${c.copyButton}</button><button class="btn" onclick="shareScript(${sectionIndex},${articleIndex},${scriptIndex})">${c.shareButton}</button></div></div>`;
    });
    html+='</div>';
  });
  return html;
}
async function loadData(){
  const params=new URLSearchParams(window.location.search);
  const key=params.get('key');
  const token=params.get('token');
  const isAdmin=params.get('admin')==='1';
  if(!key){document.getElementById('content').innerHTML=`<div class="empty-state"><div class="icon">🔒</div><p>${escapeHtml(ui().missingLink)}</p></div>`;return;}
  try{
    const headers={};
    let url=`${API}/viewer/outputs/${encodeURIComponent(key)}?token=${encodeURIComponent(token||'')}`;
    if(isAdmin){
      const adminToken=sessionStorage.getItem('admin_token')||'';
      if(!adminToken){throw new Error('Admin token missing');}
      headers.Authorization=`Bearer ${adminToken}`;
      url=`${API}/outputs/${encodeURIComponent(key)}`;
    }
    const response=await fetch(url,{headers});
    const result=await response.json();
    if(!result.success||!result.data){document.getElementById('content').innerHTML=`<div class="empty-state"><div class="icon">📭</div><p>${escapeHtml(result.error||ui().invalidLink)}</p></div>`;return;}
    const data=result.data;
    uiLanguage=data.language==='zh'?'zh':'en';
    applyStaticCopy();
    document.getElementById('dateMeta').textContent=ui().dateMeta(data);
    document.getElementById('newsCount').textContent=data.articleCount;
    document.title=ui().titleForDate(data.date);
    allSections=[{cat:'news',label:ui().newsCategory,articles:data.articles}];
    let moduleScripts=0;
    if(data.modules){data.modules.forEach(module=>{allSections.push({cat:module.moduleId,label:`${module.moduleEmoji} ${module.moduleName}`,articles:module.articles});moduleScripts+=module.articles.reduce((sum,article)=>sum+article.scripts.length,0);});}
    const newsScripts=data.articles.reduce((sum,article)=>sum+article.scripts.length,0);
    document.getElementById('moduleCount').textContent=data.modules?data.modules.length:0;
    document.getElementById('scriptCount').textContent=newsScripts+moduleScripts;
    let tabs=`<div class="cat-tab active" data-cat="all">${escapeHtml(ui().allCategory)}</div><div class="cat-tab" data-cat="news">${escapeHtml(ui().newsCategory)}</div>`;
    if(data.modules){data.modules.forEach(module=>{tabs+=`<div class="cat-tab" data-cat="${escapeHtml(module.moduleId)}">${escapeHtml(module.moduleEmoji)} ${escapeHtml(module.moduleName)}</div>`;});}
    document.getElementById('catTabs').innerHTML=tabs;
    let html='';
    allSections.forEach((section,index)=>{html+=`<div class="module-section" data-cat="${escapeHtml(section.cat)}"><div class="module-label">${escapeHtml(section.label)}</div>${renderSection(section,index)}</div>`;});
    document.getElementById('content').innerHTML=html;
  }catch(error){
    document.getElementById('content').innerHTML=`<div class="empty-state"><div class="icon">❌</div><p>${escapeHtml(ui().loadFailed(error.message||'unknown error'))}</p></div>`;
  }
}
document.getElementById('catTabs').addEventListener('click',event=>{const target=event.target.closest('.cat-tab');if(target)filterCat(target.dataset.cat);});
document.querySelector('.tabs').addEventListener('click',event=>{const target=event.target.closest('.tab');if(target)filterStyle(target.dataset.style);});
applyStaticCopy();
loadData();
    </script>
</body>

</html>
