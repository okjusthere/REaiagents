<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 今日视频文案 — RE AI Agents</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #0f172a 0%, #1e40af 50%, #7c3aed 100%);
            padding: 28px 24px;
            text-align: center;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 700;
        }

        .header .meta {
            color: #93c5fd;
            font-size: 14px;
            margin-top: 6px;
        }

        .header .stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 14px;
            flex-wrap: wrap;
        }

        .header .stat {
            text-align: center;
        }

        .header .stat-val {
            font-size: 26px;
            font-weight: 800;
        }

        .header .stat-lbl {
            font-size: 10px;
            color: #93c5fd;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px 16px;
        }

        /* Module category tabs */
        .cat-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
            overflow-x: auto;
            flex-wrap: wrap;
        }

        .cat-tab {
            padding: 6px 14px;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid #334155;
            background: #1e293b;
            color: #94a3b8;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .cat-tab:hover {
            border-color: #60a5fa;
            color: #e2e8f0;
        }

        .cat-tab.active {
            background: #7c3aed;
            color: white;
            border-color: #7c3aed;
        }

        /* Style filter tabs */
        .tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 20px;
            overflow-x: auto;
            flex-wrap: wrap;
        }

        .tab {
            padding: 6px 14px;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid #334155;
            background: #1e293b;
            color: #94a3b8;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .tab:hover {
            border-color: #60a5fa;
            color: #e2e8f0;
        }

        .tab.active {
            background: #3b82f6;
            color: white;
            border-color: #3b82f6;
        }

        .module-section {
            margin-bottom: 28px;
        }

        .module-label {
            font-size: 14px;
            font-weight: 600;
            color: #a78bfa;
            padding: 8px 0;
            border-bottom: 1px solid #334155;
            margin-bottom: 12px;
        }

        .article-section {
            margin-bottom: 20px;
        }

        .article-header {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 10px 10px 0 0;
            padding: 14px 16px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .article-num {
            background: #3b82f6;
            color: white;
            width: 26px;
            height: 26px;
            border-radius: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .article-info {
            flex: 1;
        }

        .article-title {
            font-size: 14px;
            font-weight: 600;
            color: #f1f5f9;
            line-height: 1.4;
        }

        .article-source {
            font-size: 11px;
            color: #64748b;
            margin-top: 3px;
        }

        .article-source a {
            color: #60a5fa;
            text-decoration: none;
        }

        .script-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-top: none;
            padding: 16px;
        }

        .script-card:last-child {
            border-radius: 0 0 10px 10px;
        }

        .script-card.hidden {
            display: none;
        }

        .card-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 6px;
        }

        .card-badges {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }

        .badge {
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 500;
        }

        .badge-professional {
            background: #1d4ed820;
            color: #60a5fa;
            border: 1px solid #1d4ed840;
        }

        .badge-casual {
            background: #a855f720;
            color: #c084fc;
            border: 1px solid #a855f740;
        }

        .badge-investor {
            background: #f59e0b20;
            color: #fbbf24;
            border: 1px solid #f59e0b40;
        }

        .badge-mythbuster {
            background: #ef444420;
            color: #f87171;
            border: 1px solid #ef444440;
        }

        .badge-platform {
            background: #06b6d420;
            color: #67e8f9;
            border: 1px solid #06b6d440;
        }

        .badge-duration {
            background: #10b98120;
            color: #34d399;
            border: 1px solid #10b98140;
        }

        .section-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #64748b;
            margin-bottom: 4px;
            font-weight: 600;
        }

        .hook {
            font-size: 15px;
            font-weight: 600;
            color: #fbbf24;
            line-height: 1.5;
            margin-bottom: 12px;
            padding: 10px;
            background: #fbbf2408;
            border-left: 3px solid #fbbf24;
            border-radius: 0 6px 6px 0;
        }

        .content-text {
            font-size: 13px;
            color: #cbd5e1;
            line-height: 1.8;
            margin-bottom: 12px;
        }

        .cta-text {
            font-size: 13px;
            color: #34d399;
            font-weight: 500;
            line-height: 1.5;
            padding: 8px 10px;
            background: #34d39908;
            border-left: 3px solid #34d399;
            border-radius: 0 6px 6px 0;
            margin-bottom: 10px;
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-bottom: 10px;
        }

        .tag {
            padding: 2px 7px;
            background: #334155;
            color: #94a3b8;
            border-radius: 5px;
            font-size: 11px;
        }

        .card-actions {
            display: flex;
            gap: 6px;
        }

        .btn {
            padding: 6px 12px;
            border-radius: 7px;
            border: 1px solid #334155;
            background: #0f172a;
            color: #94a3b8;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .btn:hover {
            background: #334155;
            color: white;
        }

        .btn.copied {
            background: #059669;
            color: white;
            border-color: #059669;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 13px;
            z-index: 200;
            display: none;
            background: #065f46;
            color: #34d399;
            border: 1px solid #34d39940;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                transform: translate(-50%, 20px);
                opacity: 0;
            }

            to {
                transform: translate(-50%, 0);
                opacity: 1;
            }
        }

        .empty-state {
            text-align: center;
            padding: 48px 24px;
            color: #64748b;
        }

        .empty-state .icon {
            font-size: 40px;
            margin-bottom: 12px;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>🎬 房地产经纪人每日视频文案</h1>
        <div class="meta" id="dateMeta">加载中...</div>
        <div class="stats">
            <div class="stat">
                <div class="stat-val" id="newsCount">-</div>
                <div class="stat-lbl">新闻</div>
            </div>
            <div class="stat">
                <div class="stat-val" id="moduleCount">-</div>
                <div class="stat-lbl">模块</div>
            </div>
            <div class="stat">
                <div class="stat-val" id="scriptCount">-</div>
                <div class="stat-lbl">文案</div>
            </div>
            <div class="stat">
                <div class="stat-val">4</div>
                <div class="stat-lbl">风格</div>
            </div>
        </div>
    </div>
    <div class="container">
        <div class="cat-tabs" id="catTabs"></div>
        <div class="tabs">
            <div class="tab active" data-style="all">全部风格</div>
            <div class="tab" data-style="professional">📊 专业</div>
            <div class="tab" data-style="casual">😄 轻松</div>
            <div class="tab" data-style="investor">💰 投资</div>
            <div class="tab" data-style="mythbuster">🔍 避坑</div>
        </div>
        <div id="content"></div>
    </div>
    <div class="toast" id="toast"></div>
    <script>
const API='/api';
let _allSections=[];
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.style.display='block';setTimeout(()=>{t.style.display='none';},2000);}
function getStyleName(s){return{professional:'专业分析型',casual:'轻松聊天型',investor:'投资顾问型',mythbuster:'犀利避坑型'}[s]||s;}
function buildText(a,s){return`🎬 ${a.title}\n\n🎯 开场钩子\n${s.hook}\n\n📝 主要内容\n${s.content}\n\n💬 行动号召\n${s.cta}\n\n📱 ${s.platform} ⏱️ ${s.duration}\n🏷️ ${s.tags.join(', ')}`;}
function copyScript(si,ai,sci){
  const sec=_allSections[si];const a=sec.articles[ai];const s=a.scripts[sci];
  navigator.clipboard.writeText(buildText(a,s)).then(()=>{
    showToast('✅ 文案已复制到剪贴板');
    const b=document.getElementById(`cp-${si}-${ai}-${sci}`);if(b){b.textContent='✅ 已复制';b.classList.add('copied');setTimeout(()=>{b.textContent='📋 复制';b.classList.remove('copied');},2000);}
  });
}
function shareScript(si,ai,sci){
  const sec=_allSections[si];const a=sec.articles[ai];const s=a.scripts[sci];
  const t=buildText(a,s);
  if(navigator.share)navigator.share({title:a.title,text:t}).catch(()=>{});
  else navigator.clipboard.writeText(t).then(()=>showToast('✅ 文案已复制，可粘贴分享'));
}
function filterCat(cat){
  document.querySelectorAll('.cat-tab').forEach(t=>t.classList.toggle('active',t.dataset.cat===cat));
  document.querySelectorAll('.module-section').forEach(s=>{if(cat==='all')s.classList.remove('hidden');else s.classList.toggle('hidden',s.dataset.cat!==cat);});
}
function filterStyle(style){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.style===style));
  document.querySelectorAll('.script-card').forEach(c=>{if(style==='all')c.classList.remove('hidden');else c.classList.toggle('hidden',c.dataset.style!==style);});
}
function renderSection(section,si){
  let h='';
  section.articles.forEach((a,ai)=>{
    h+=`<div class="article-section"><div class="article-header"><div class="article-num">${ai+1}</div><div class="article-info"><div class="article-title">${a.title}</div><div class="article-source">${a.source}${a.url?` · <a href="${a.url}" target="_blank">原文↗</a>`:''}</div></div></div>`;
    a.scripts.forEach((s,sci)=>{
      h+=`<div class="script-card" data-style="${s.style}"><div class="card-top"><div class="card-badges"><span class="badge badge-${s.style}">${s.styleName||getStyleName(s.style)}</span><span class="badge badge-platform">📱 ${s.platform}</span><span class="badge badge-duration">⏱️ ${s.duration}</span></div></div>
      <div class="section-label">🎯 开场钩子</div><div class="hook">${s.hook}</div>
      <div class="section-label">📝 主要内容</div><div class="content-text">${s.content}</div>
      <div class="section-label">💬 行动号召</div><div class="cta-text">${s.cta}</div>
      <div class="tags">${s.tags.map(t=>`<span class="tag">#${t}</span>`).join('')}</div>
      <div class="card-actions"><button class="btn" id="cp-${si}-${ai}-${sci}" onclick="copyScript(${si},${ai},${sci})">📋 复制</button><button class="btn" onclick="shareScript(${si},${ai},${sci})">🔗 分享</button></div></div>`;
    });
    h+=`</div>`;
  });
  return h;
}
async function loadData(){
  const params=new URLSearchParams(window.location.search);
  const date=params.get('date')||new Date().toISOString().split('T')[0];
  try{
    const res=await fetch(`${API}/outputs/${date}`);
    const result=await res.json();
    if(!result.success||!result.data){document.getElementById('content').innerHTML=`<div class="empty-state"><div class="icon">📭</div><p>暂无 ${date} 的文案数据</p></div>`;return;}
    const data=result.data;
    document.getElementById('dateMeta').textContent=`📅 ${date} · 为您精选的视频文案`;
    document.getElementById('newsCount').textContent=data.articleCount;
    document.title=`🎬 ${date} 文案 — RE AI Agents`;

    // Build sections: news + modules
    _allSections=[];
    _allSections.push({cat:'news',label:'📰 新闻热点',articles:data.articles});
    let moduleScripts=0;
    if(data.modules){data.modules.forEach(m=>{_allSections.push({cat:m.moduleId,label:`${m.moduleEmoji} ${m.moduleName}`,articles:m.articles});moduleScripts+=m.articles.reduce((s,a)=>s+a.scripts.length,0);});}
    const newsScripts=data.articles.reduce((s,a)=>s+a.scripts.length,0);
    document.getElementById('moduleCount').textContent=data.modules?data.modules.length:0;
    document.getElementById('scriptCount').textContent=newsScripts+moduleScripts;

    // Category tabs
    let catH=`<div class="cat-tab active" data-cat="all">全部</div><div class="cat-tab" data-cat="news">📰 新闻</div>`;
    if(data.modules)data.modules.forEach(m=>{catH+=`<div class="cat-tab" data-cat="${m.moduleId}">${m.moduleEmoji} ${m.moduleName}</div>`;});
    document.getElementById('catTabs').innerHTML=catH;

    // Render all sections
    let html='';
    _allSections.forEach((sec,si)=>{
      html+=`<div class="module-section" data-cat="${sec.cat}"><div class="module-label">${sec.label}</div>${renderSection(sec,si)}</div>`;
    });
    document.getElementById('content').innerHTML=html;
  }catch(e){document.getElementById('content').innerHTML=`<div class="empty-state"><div class="icon">❌</div><p>加载失败: ${e.message}</p></div>`;}
}
document.getElementById('catTabs').addEventListener('click',e=>{if(e.target.classList.contains('cat-tab'))filterCat(e.target.dataset.cat);});
document.querySelector('.tabs').addEventListener('click',e=>{if(e.target.classList.contains('tab'))filterStyle(e.target.dataset.style);});
loadData();
    </script>
</body>

</html>
