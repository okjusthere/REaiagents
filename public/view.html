<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 今日视频文案 — RE AI Agents</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #0f172a 0%, #1e40af 50%, #7c3aed 100%);
            padding: 28px 24px;
            text-align: center;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 700;
        }

        .header .meta {
            color: #93c5fd;
            font-size: 14px;
            margin-top: 6px;
        }

        .header .stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 14px;
            flex-wrap: wrap;
        }

        .header .stat {
            text-align: center;
        }

        .header .stat-val {
            font-size: 26px;
            font-weight: 800;
        }

        .header .stat-lbl {
            font-size: 10px;
            color: #93c5fd;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px 16px;
        }

        /* Module category tabs */
        .cat-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
            overflow-x: auto;
            flex-wrap: wrap;
        }

        .cat-tab {
            padding: 6px 14px;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid #334155;
            background: #1e293b;
            color: #94a3b8;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .cat-tab:hover {
            border-color: #60a5fa;
            color: #e2e8f0;
        }

        .cat-tab.active {
            background: #7c3aed;
            color: white;
            border-color: #7c3aed;
        }

        /* Style filter tabs */
        .tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 20px;
            overflow-x: auto;
            flex-wrap: wrap;
        }

        .tab {
            padding: 6px 14px;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid #334155;
            background: #1e293b;
            color: #94a3b8;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .tab:hover {
            border-color: #60a5fa;
            color: #e2e8f0;
        }

        .tab.active {
            background: #3b82f6;
            color: white;
            border-color: #3b82f6;
        }

        .module-section {
            margin-bottom: 28px;
        }

        .module-label {
            font-size: 14px;
            font-weight: 600;
            color: #a78bfa;
            padding: 8px 0;
            border-bottom: 1px solid #334155;
            margin-bottom: 12px;
        }

        .article-section {
            margin-bottom: 20px;
        }

        .article-header {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 10px 10px 0 0;
            padding: 14px 16px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .article-num {
            background: #3b82f6;
            color: white;
            width: 26px;
            height: 26px;
            border-radius: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .article-info {
            flex: 1;
        }

        .article-title {
            font-size: 14px;
            font-weight: 600;
            color: #f1f5f9;
            line-height: 1.4;
        }

        .article-source {
            font-size: 11px;
            color: #64748b;
            margin-top: 3px;
        }

        .article-source a {
            color: #60a5fa;
            text-decoration: none;
        }

        .script-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-top: none;
            padding: 16px;
        }

        .script-card:last-child {
            border-radius: 0 0 10px 10px;
        }

        .script-card.hidden {
            display: none;
        }

        .hidden {
            display: none !important;
        }

        .card-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 6px;
        }

        .card-badges {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }

        .badge {
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 500;
        }

        .badge-professional {
            background: #1d4ed820;
            color: #60a5fa;
            border: 1px solid #1d4ed840;
        }

        .badge-casual {
            background: #a855f720;
            color: #c084fc;
            border: 1px solid #a855f740;
        }

        .badge-investor {
            background: #f59e0b20;
            color: #fbbf24;
            border: 1px solid #f59e0b40;
        }

        .badge-mythbuster {
            background: #ef444420;
            color: #f87171;
            border: 1px solid #ef444440;
        }

        .badge-platform {
            background: #06b6d420;
            color: #67e8f9;
            border: 1px solid #06b6d440;
        }

        .badge-duration {
            background: #10b98120;
            color: #34d399;
            border: 1px solid #10b98140;
        }

        .section-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #64748b;
            margin-bottom: 4px;
            font-weight: 600;
        }

        .hook {
            font-size: 15px;
            font-weight: 600;
            color: #fbbf24;
            line-height: 1.5;
            margin-bottom: 12px;
            padding: 10px;
            background: #fbbf2408;
            border-left: 3px solid #fbbf24;
            border-radius: 0 6px 6px 0;
        }

        .content-text {
            font-size: 13px;
            color: #cbd5e1;
            line-height: 1.8;
            margin-bottom: 12px;
        }

        .cta-text {
            font-size: 13px;
            color: #34d399;
            font-weight: 500;
            line-height: 1.5;
            padding: 8px 10px;
            background: #34d39908;
            border-left: 3px solid #34d399;
            border-radius: 0 6px 6px 0;
            margin-bottom: 10px;
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-bottom: 10px;
        }

        .tag {
            padding: 2px 7px;
            background: #334155;
            color: #94a3b8;
            border-radius: 5px;
            font-size: 11px;
        }

        .card-actions {
            display: flex;
            gap: 6px;
        }

        .btn {
            padding: 6px 12px;
            border-radius: 7px;
            border: 1px solid #334155;
            background: #0f172a;
            color: #94a3b8;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .btn:hover {
            background: #334155;
            color: white;
        }

        .btn.copied {
            background: #059669;
            color: white;
            border-color: #059669;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 13px;
            z-index: 200;
            display: none;
            background: #065f46;
            color: #34d399;
            border: 1px solid #34d39940;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                transform: translate(-50%, 20px);
                opacity: 0;
            }

            to {
                transform: translate(-50%, 0);
                opacity: 1;
            }
        }

        .empty-state {
            text-align: center;
            padding: 48px 24px;
            color: #64748b;
        }

        .empty-state .icon {
            font-size: 40px;
            margin-bottom: 12px;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>🎬 房地产经纪人每日视频文案</h1>
        <div class="meta" id="dateMeta">加载中...</div>
        <div class="stats">
            <div class="stat">
                <div class="stat-val" id="newsCount">-</div>
                <div class="stat-lbl">新闻</div>
            </div>
            <div class="stat">
                <div class="stat-val" id="moduleCount">-</div>
                <div class="stat-lbl">模块</div>
            </div>
            <div class="stat">
                <div class="stat-val" id="scriptCount">-</div>
                <div class="stat-lbl">文案</div>
            </div>
            <div class="stat">
                <div class="stat-val">4</div>
                <div class="stat-lbl">风格</div>
            </div>
        </div>
    </div>
    <div class="container">
        <div class="cat-tabs" id="catTabs"></div>
        <div class="tabs">
            <div class="tab active" data-style="all">全部风格</div>
            <div class="tab" data-style="professional">📊 专业</div>
            <div class="tab" data-style="casual">😄 轻松</div>
            <div class="tab" data-style="investor">💰 投资</div>
            <div class="tab" data-style="mythbuster">🔍 避坑</div>
        </div>
        <div id="content"></div>
    </div>
    <div class="toast" id="toast"></div>
    <script>
const API='/api';
let allSections=[];
function escapeHtml(value){return String(value).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function safeUrl(value){try{const url=new URL(value);return ['http:','https:'].includes(url.protocol)?url.toString():null;}catch{return null;}}
function showToast(message){const toast=document.getElementById('toast');toast.textContent=message;toast.style.display='block';setTimeout(()=>{toast.style.display='none';},2000);}
function getStyleName(style){return{professional:'专业分析型',casual:'轻松聊天型',investor:'投资顾问型',mythbuster:'犀利避坑型'}[style]||style;}
function buildText(article,script){return`🎬 ${article.title}\n\n🎯 开场钩子\n${script.hook}\n\n📝 主要内容\n${script.content}\n\n💬 行动号召\n${script.cta}\n\n📱 ${script.platform} ⏱️ ${script.duration}\n🏷️ ${script.tags.join(', ')}`;}
function copyScript(sectionIndex,articleIndex,scriptIndex){
  const section=allSections[sectionIndex];const article=section.articles[articleIndex];const script=article.scripts[scriptIndex];
  navigator.clipboard.writeText(buildText(article,script)).then(()=>{
    showToast('✅ 文案已复制到剪贴板');
    const button=document.getElementById(`cp-${sectionIndex}-${articleIndex}-${scriptIndex}`);
    if(button){button.textContent='✅ 已复制';button.classList.add('copied');setTimeout(()=>{button.textContent='📋 复制';button.classList.remove('copied');},2000);}
  });
}
function shareScript(sectionIndex,articleIndex,scriptIndex){
  const section=allSections[sectionIndex];const article=section.articles[articleIndex];const script=article.scripts[scriptIndex];
  const text=buildText(article,script);
  if(navigator.share){navigator.share({title:article.title,text}).catch(()=>{});}
  else navigator.clipboard.writeText(text).then(()=>showToast('✅ 文案已复制，可粘贴分享'));
}
function filterCat(category){
  document.querySelectorAll('.cat-tab').forEach(tab=>tab.classList.toggle('active',tab.dataset.cat===category));
  document.querySelectorAll('.module-section').forEach(section=>{if(category==='all')section.classList.remove('hidden');else section.classList.toggle('hidden',section.dataset.cat!==category);});
}
function filterStyle(style){
  document.querySelectorAll('.tab').forEach(tab=>tab.classList.toggle('active',tab.dataset.style===style));
  document.querySelectorAll('.script-card').forEach(card=>{if(style==='all')card.classList.remove('hidden');else card.classList.toggle('hidden',card.dataset.style!==style);});
}
function renderSection(section,sectionIndex){
  let html='';
  section.articles.forEach((article,articleIndex)=>{
    const link=safeUrl(article.url);
    html+=`<div class="article-section"><div class="article-header"><div class="article-num">${articleIndex+1}</div><div class="article-info"><div class="article-title">${escapeHtml(article.title)}</div><div class="article-source">${escapeHtml(article.source)}${link?` · <a href="${link}" target="_blank" rel="noopener noreferrer">原文↗</a>`:''}</div></div></div>`;
    article.scripts.forEach((script,scriptIndex)=>{
      html+=`<div class="script-card" data-style="${escapeHtml(script.style)}"><div class="card-top"><div class="card-badges"><span class="badge badge-${escapeHtml(script.style)}">${escapeHtml(script.styleName||getStyleName(script.style))}</span><span class="badge badge-platform">📱 ${escapeHtml(script.platform)}</span><span class="badge badge-duration">⏱️ ${escapeHtml(script.duration)}</span></div></div>
      <div class="section-label">🎯 开场钩子</div><div class="hook">${escapeHtml(script.hook)}</div>
      <div class="section-label">📝 主要内容</div><div class="content-text">${escapeHtml(script.content).replace(/\n/g,'<br>')}</div>
      <div class="section-label">💬 行动号召</div><div class="cta-text">${escapeHtml(script.cta)}</div>
      <div class="tags">${script.tags.map(tag=>`<span class="tag">#${escapeHtml(tag)}</span>`).join('')}</div>
      <div class="card-actions"><button class="btn" id="cp-${sectionIndex}-${articleIndex}-${scriptIndex}" onclick="copyScript(${sectionIndex},${articleIndex},${scriptIndex})">📋 复制</button><button class="btn" onclick="shareScript(${sectionIndex},${articleIndex},${scriptIndex})">🔗 分享</button></div></div>`;
    });
    html+='</div>';
  });
  return html;
}
async function loadData(){
  const params=new URLSearchParams(window.location.search);
  const key=params.get('key');
  const token=params.get('token');
  const isAdmin=params.get('admin')==='1';
  if(!key){document.getElementById('content').innerHTML='<div class="empty-state"><div class="icon">🔒</div><p>缺少访问凭证，请使用邮件中的专属链接打开。</p></div>';return;}
  try{
    const headers={};
    let url=`${API}/viewer/outputs/${encodeURIComponent(key)}?token=${encodeURIComponent(token||'')}`;
    if(isAdmin){
      const adminToken=sessionStorage.getItem('admin_token')||'';
      if(!adminToken){throw new Error('Admin token missing');}
      headers.Authorization=`Bearer ${adminToken}`;
      url=`${API}/outputs/${encodeURIComponent(key)}`;
    }
    const response=await fetch(url,{headers});
    const result=await response.json();
    if(!result.success||!result.data){document.getElementById('content').innerHTML=`<div class="empty-state"><div class="icon">📭</div><p>${escapeHtml(result.error||'未找到文案')}</p></div>`;return;}
    const data=result.data;
    document.getElementById('dateMeta').textContent=`📅 ${data.date} · ${data.market} · ${data.language.toUpperCase()}`;
    document.getElementById('newsCount').textContent=data.articleCount;
    document.title=`🎬 ${data.date} 文案 — REscript`;
    allSections=[{cat:'news',label:'📰 新闻热点',articles:data.articles}];
    let moduleScripts=0;
    if(data.modules){data.modules.forEach(module=>{allSections.push({cat:module.moduleId,label:`${module.moduleEmoji} ${module.moduleName}`,articles:module.articles});moduleScripts+=module.articles.reduce((sum,article)=>sum+article.scripts.length,0);});}
    const newsScripts=data.articles.reduce((sum,article)=>sum+article.scripts.length,0);
    document.getElementById('moduleCount').textContent=data.modules?data.modules.length:0;
    document.getElementById('scriptCount').textContent=newsScripts+moduleScripts;
    let tabs='<div class="cat-tab active" data-cat="all">全部</div><div class="cat-tab" data-cat="news">📰 新闻</div>';
    if(data.modules){data.modules.forEach(module=>{tabs+=`<div class="cat-tab" data-cat="${escapeHtml(module.moduleId)}">${escapeHtml(module.moduleEmoji)} ${escapeHtml(module.moduleName)}</div>`;});}
    document.getElementById('catTabs').innerHTML=tabs;
    let html='';
    allSections.forEach((section,index)=>{html+=`<div class="module-section" data-cat="${escapeHtml(section.cat)}"><div class="module-label">${escapeHtml(section.label)}</div>${renderSection(section,index)}</div>`;});
    document.getElementById('content').innerHTML=html;
  }catch(error){
    document.getElementById('content').innerHTML=`<div class="empty-state"><div class="icon">❌</div><p>加载失败: ${escapeHtml(error.message||'unknown error')}</p></div>`;
  }
}
document.getElementById('catTabs').addEventListener('click',event=>{const target=event.target.closest('.cat-tab');if(target)filterCat(target.dataset.cat);});
document.querySelector('.tabs').addEventListener('click',event=>{const target=event.target.closest('.tab');if(target)filterStyle(target.dataset.style);});
loadData();
    </script>
</body>

</html>
