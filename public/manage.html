<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Subscription · REscript</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            min-height: 100vh;
            background: linear-gradient(180deg, #eef2ff 0%, #f8fafc 100%);
            color: #0f172a;
            padding: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            width: 100%;
            max-width: 560px;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(15, 23, 42, 0.08);
            padding: 32px;
        }
        h1 { font-size: 28px; margin-bottom: 12px; }
        p { color: #475569; line-height: 1.7; margin-bottom: 14px; }
        .meta {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            padding: 16px;
            margin: 20px 0;
        }
        .meta-row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            padding: 8px 0;
            border-bottom: 1px solid #e2e8f0;
        }
        .meta-row:last-child { border-bottom: none; }
        .label { color: #64748b; font-size: 14px; }
        .value { font-weight: 600; text-align: right; }
        .actions { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 24px; }
        button, a.button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 46px;
            padding: 0 18px;
            border-radius: 12px;
            border: 1px solid #cbd5e1;
            background: #0f172a;
            color: white;
            text-decoration: none;
            font: inherit;
            cursor: pointer;
        }
        button.secondary, a.button.secondary {
            background: white;
            color: #0f172a;
        }
        .status {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 700;
            margin-top: 8px;
        }
        .status.active { background: #dcfce7; color: #166534; }
        .status.paused { background: #fee2e2; color: #991b1b; }
        .message {
            margin-top: 18px;
            padding: 14px 16px;
            border-radius: 12px;
            display: none;
        }
        .message.success { display: block; background: #dcfce7; color: #166534; }
        .message.error { display: block; background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Manage Your Subscription</h1>
        <p>Use this page to pause or resume delivery, and paid subscribers can open the Stripe billing portal from here.</p>
        <div id="statusBadge" class="status">Loading...</div>
        <div class="meta" id="metaBox" style="display:none;">
            <div class="meta-row"><span class="label">Email</span><span class="value" id="emailValue"></span></div>
            <div class="meta-row"><span class="label">Plan</span><span class="value" id="planValue"></span></div>
            <div class="meta-row"><span class="label">Language</span><span class="value" id="languageValue"></span></div>
            <div class="meta-row"><span class="label">Market</span><span class="value" id="marketValue"></span></div>
        </div>
        <div class="actions">
            <button id="pauseBtn" onclick="unsubscribe()">Pause delivery</button>
            <button id="resumeBtn" class="secondary" onclick="resubscribe()">Resume delivery</button>
            <button id="billingBtn" class="secondary" onclick="openBilling()">Open billing portal</button>
            <a href="/" class="button secondary">Back to home</a>
        </div>
        <div id="message" class="message"></div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token') || '';
        let currentState = null;

        function showMessage(type, text) {
            const box = document.getElementById('message');
            box.className = `message ${type}`;
            box.textContent = text;
        }

        async function loadStatus() {
            if (!token) {
                showMessage('error', 'Missing manage token.');
                document.getElementById('statusBadge').textContent = 'Invalid link';
                return;
            }

            const response = await fetch(`/api/subscription/status?token=${encodeURIComponent(token)}`);
            const result = await response.json();
            if (!result.success) {
                showMessage('error', result.error || 'Unable to load this link.');
                document.getElementById('statusBadge').textContent = 'Invalid link';
                return;
            }

            currentState = result.data;
            document.getElementById('metaBox').style.display = 'block';
            document.getElementById('emailValue').textContent = result.data.email;
            document.getElementById('planValue').textContent = result.data.plan;
            document.getElementById('languageValue').textContent = result.data.language;
            document.getElementById('marketValue').textContent = result.data.market;
            const badge = document.getElementById('statusBadge');
            badge.textContent = result.data.active ? 'Delivery active' : 'Delivery paused';
            badge.className = `status ${result.data.active ? 'active' : 'paused'}`;
            document.getElementById('pauseBtn').style.display = result.data.active ? 'inline-flex' : 'none';
            document.getElementById('resumeBtn').style.display = result.data.active ? 'none' : 'inline-flex';
            document.getElementById('billingBtn').style.display = result.data.hasBilling ? 'inline-flex' : 'none';
        }

        async function unsubscribe() {
            const response = await fetch('/api/subscription/unsubscribe', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token }),
            });
            const result = await response.json();
            if (!result.success) {
                showMessage('error', result.error || 'Unable to pause delivery.');
                return;
            }
            showMessage('success', 'Delivery paused. You will no longer receive daily emails until you resume.');
            loadStatus();
        }

        async function resubscribe() {
            const response = await fetch('/api/subscription/resubscribe', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token }),
            });
            const result = await response.json();
            if (!result.success) {
                showMessage('error', result.error || 'Unable to resume delivery.');
                return;
            }
            showMessage('success', 'Delivery resumed.');
            loadStatus();
        }

        async function openBilling() {
            const response = await fetch('/api/subscription/billing-portal', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token }),
            });
            const result = await response.json();
            if (!result.success || !result.url) {
                showMessage('error', result.error || 'Unable to open billing portal.');
                return;
            }
            window.location.href = result.url;
        }

        loadStatus().catch(() => showMessage('error', 'Unable to load this page.'));
    </script>
</body>
</html>
