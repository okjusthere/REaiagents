<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
  <meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet">
  <meta name="theme-color" content="#0f172a">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/favicon.svg">
  <title>RE AI Agents · 管理后台</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }

    /* ── Login Gate ──────────────────────── */
    .login-gate {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .login-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 36px 32px;
      width: 400px;
      max-width: 100%;
      text-align: center;
    }

    .login-card h1 {
      font-size: 22px;
      margin-bottom: 8px;
    }

    .login-card h1 span {
      color: #60a5fa;
    }

    .login-card p {
      color: #64748b;
      font-size: 14px;
      margin-bottom: 24px;
    }

    .login-card input {
      width: 100%;
      padding: 12px 16px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 10px;
      color: #e2e8f0;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      margin-bottom: 16px;
      transition: border-color 0.2s;
    }

    .login-card input:focus {
      border-color: #3b82f6;
    }

    .login-card .login-btn {
      width: 100%;
      padding: 12px;
      background: #3b82f6;
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s;
    }

    .login-card .login-btn:hover {
      background: #2563eb;
    }

    .login-error {
      color: #f87171;
      font-size: 13px;
      margin-top: 12px;
      display: none;
    }

    /* ── Admin Dashboard (hidden until auth) ── */
    .admin-content {
      display: none;
    }

    .header {
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      border-bottom: 1px solid #1e293b;
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .header h1 {
      font-size: 20px;
      font-weight: 700;
    }

    .header h1 span {
      color: #60a5fa;
    }

    .header-actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .status-badge {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
    }

    .status-badge.online {
      background: #065f4620;
      color: #34d399;
      border: 1px solid #34d39940;
    }

    .status-badge.running {
      background: #f59e0b20;
      color: #fbbf24;
      border: 1px solid #fbbf2440;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.6;
      }
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .card-title {
      font-size: 16px;
      font-weight: 600;
      color: #f1f5f9;
    }

    .card-subtitle {
      font-size: 13px;
      color: #94a3b8;
      margin-top: 4px;
    }

    .btn {
      padding: 8px 18px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn-primary {
      background: #3b82f6;
      color: white;
    }

    .btn-primary:hover {
      background: #2563eb;
    }

    .btn-danger {
      background: #ef444420;
      color: #f87171;
      border: 1px solid #ef444440;
    }

    .btn-danger:hover {
      background: #ef444430;
    }

    .btn-success {
      background: #10b981;
      color: white;
    }

    .btn-success:hover {
      background: #059669;
    }

    .btn-ghost {
      background: transparent;
      color: #94a3b8;
      border: 1px solid #334155;
    }

    .btn-ghost:hover {
      background: #334155;
      color: #f1f5f9;
    }

    .btn-sm {
      padding: 5px 12px;
      font-size: 13px;
    }

    .btn-logout {
      background: transparent;
      color: #64748b;
      border: 1px solid #334155;
      font-size: 12px;
      padding: 5px 12px;
    }

    .btn-logout:hover {
      background: #334155;
      color: #f87171;
    }

    .table {
      width: 100%;
      border-collapse: collapse;
    }

    .table th {
      text-align: left;
      padding: 10px 12px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #64748b;
      border-bottom: 1px solid #334155;
    }

    .table td {
      padding: 14px 12px;
      border-bottom: 1px solid #1e293b;
      font-size: 14px;
    }

    .table tr:hover td {
      background: #1e293b80;
    }

    .active-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 6px;
    }

    .active-dot.on {
      background: #34d399;
    }

    .active-dot.off {
      background: #64748b;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 14px;
      z-index: 200;
      animation: slideIn 0.3s ease-out;
      display: none;
    }

    .toast.success {
      background: #065f46;
      color: #34d399;
      border: 1px solid #34d39940;
    }

    .toast.error {
      background: #7f1d1d;
      color: #fca5a5;
      border: 1px solid #ef444440;
    }

    @keyframes slideIn {
      from {
        transform: translateY(20px);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: #64748b;
    }

    .empty-state .icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 16px 20px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
      color: #f1f5f9;
    }

    .stat-label {
      font-size: 12px;
      color: #64748b;
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .quick-add {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
    }

    .quick-add input {
      flex: 1;
      padding: 12px 16px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      color: #e2e8f0;
      font-size: 14px;
      outline: none;
      font-family: inherit;
    }

    .quick-add input:focus {
      border-color: #3b82f6;
    }

    .output-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .output-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: #0f172a;
      border-radius: 8px;
      border: 1px solid #334155;
    }

    .output-item a {
      color: #60a5fa;
      text-decoration: none;
      font-weight: 500;
    }

    .output-item a:hover {
      text-decoration: underline;
    }

    .output-date {
      font-size: 14px;
    }

    .plan-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
    }

    .plan-badge.subscriber {
      background: #6366f120;
      color: #a5b4fc;
      border: 1px solid #6366f140;
    }

    .plan-badge.vip {
      background: #d9770620;
      color: #fbbf24;
      border: 1px solid #d9770640;
    }

    .plan-badge.free {
      background: #64748b20;
      color: #94a3b8;
      border: 1px solid #64748b40;
    }

    .plan-badge.trial-used {
      background: #f59e0b20;
      color: #fbbf24;
      border: 1px solid #f59e0b40;
    }

    .btn-vip {
      background: #d9770620;
      color: #fbbf24;
      border: 1px solid #d9770640;
      font-size: 13px;
      padding: 5px 12px;
    }

    .btn-vip:hover {
      background: #d9770640;
    }

    .inline-select {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 6px;
      color: #e2e8f0;
      font-size: 12px;
      padding: 4px 6px;
      cursor: pointer;
      font-family: inherit;
    }

    .inline-select:focus {
      border-color: #3b82f6;
      outline: none;
    }

    .view-switch {
      display: inline-flex;
      gap: 6px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 4px;
    }

    .view-btn {
      border: none;
      background: transparent;
      color: #94a3b8;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
    }

    .view-btn.active {
      background: #1e293b;
      color: #e2e8f0;
      border: 1px solid #334155;
    }

    .billing-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
    }

    .billing-badge.active {
      background: #065f4620;
      color: #34d399;
      border: 1px solid #34d39940;
    }

    .billing-badge.ending {
      background: #f59e0b20;
      color: #fbbf24;
      border: 1px solid #f59e0b40;
    }

    .billing-badge.ended {
      background: #ef444420;
      color: #fca5a5;
      border: 1px solid #ef444440;
    }

    .billing-badge.vip {
      background: #d9770620;
      color: #fbbf24;
      border: 1px solid #d9770640;
    }

    .billing-badge.free {
      background: #64748b20;
      color: #94a3b8;
      border: 1px solid #64748b40;
    }
  </style>
</head>

<body>

  <!-- ═══ Login Gate ═══ -->
  <div class="login-gate" id="loginGate">
    <div class="login-card">
      <h1>🔒 RE AI <span>Admin</span></h1>
      <p>请输入管理密码 / Enter admin token</p>
      <input type="password" id="tokenInput" placeholder="Admin Token"
        onkeydown="if(event.key==='Enter')attemptLogin()">
      <button class="login-btn" onclick="attemptLogin()">🔓 登录 Login</button>
      <div class="login-error" id="loginError">密码错误 / Invalid token</div>
    </div>
  </div>

  <!-- ═══ Admin Dashboard (hidden until authenticated) ═══ -->
  <div class="admin-content" id="adminContent">
    <div class="header">
      <h1>🏠 RE AI Agents · <span>管理后台</span></h1>
      <div class="header-actions">
        <div id="statusBadge" class="status-badge online">● 运行中</div>
        <button class="btn btn-success" onclick="sendNow()">🚀 立即发送</button>
        <button class="btn btn-logout" onclick="logout()">🚪 退出</button>
      </div>
    </div>

    <div class="container">
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-value" id="totalClients">0</div>
          <div class="stat-label">总客户数</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="subscriberCount">0</div>
          <div class="stat-label">💳 付费订阅</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="vipCount">0</div>
          <div class="stat-label">👑 VIP</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="trialCount">0</div>
          <div class="stat-label">🎁 待体验</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="scheduleTime">--</div>
          <div class="stat-label">定时发送</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="modelName">--</div>
          <div class="stat-label">AI 模型</div>
        </div>
      </div>

      <!-- Quick add -->
      <div class="card">
        <div class="card-title" style="margin-bottom:12px">⚡ 快速添加订阅</div>
        <div class="quick-add">
          <input type="email" id="quickEmail" placeholder="输入邮箱地址即可订阅..." onkeydown="if(event.key==='Enter')quickAdd()">
          <button class="btn btn-primary" onclick="quickAdd()">+ 添加</button>
        </div>
      </div>

      <div class="card">
        <div class="card-header" style="display:flex;align-items:center;justify-content:space-between;">
          <div>
            <div class="card-title">📋 订阅客户</div>
            <div class="card-subtitle" id="clientSubtitle">每日自动发送文案邮件（所有风格）</div>
          </div>
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
            <div class="view-switch">
              <button class="view-btn active" id="viewActivePaidBtn" onclick="setClientView('active-paid')">活跃付费/VIP</button>
              <button class="view-btn" id="viewAllBtn" onclick="setClientView('all')">全部客户</button>
            </div>
            <button class="btn" style="font-size:12px;padding:6px 12px;background:#0f766e;" onclick="exportCSV()">📥 导出
              CSV</button>
          </div>
        </div>
        <div id="clientList"></div>
      </div>

      <!-- Output history -->
      <div class="card">
        <div class="card-header">
          <div>
            <div class="card-title">📂 历史文案</div>
            <div class="card-subtitle">点击查看/分享历史文案</div>
          </div>
        </div>
        <div id="outputList"></div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const API = '/api';
    let clientView = 'active-paid';
    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    // ── Auth Token Management ─────────────────────────────
    function getToken() {
      return sessionStorage.getItem('admin_token') || '';
    }

    function setToken(token) {
      sessionStorage.setItem('admin_token', token);
    }

    function clearToken() {
      sessionStorage.removeItem('admin_token');
    }

    function authHeaders() {
      return {
        'Authorization': `Bearer ${getToken()}`,
        'Content-Type': 'application/json',
      };
    }

    // ── Login ─────────────────────────────────────────────
    async function attemptLogin() {
      const token = document.getElementById('tokenInput').value.trim();
      if (!token) return;

      setToken(token);

      try {
        // Verify token by calling a protected endpoint
        const res = await fetch(`${API}/status`, { headers: authHeaders() });
        if (res.status === 401) {
          clearToken();
          document.getElementById('loginError').style.display = 'block';
          return;
        }
        // Success — show admin
        showAdmin();
      } catch (e) {
        clearToken();
        document.getElementById('loginError').style.display = 'block';
      }
    }

    function showAdmin() {
      document.getElementById('loginGate').style.display = 'none';
      document.getElementById('adminContent').style.display = 'block';
      loadClients();
      loadStatus();
      loadOutputs();
    }

    function logout() {
      clearToken();
      document.getElementById('adminContent').style.display = 'none';
      document.getElementById('loginGate').style.display = 'flex';
      document.getElementById('tokenInput').value = '';
      document.getElementById('loginError').style.display = 'none';
    }

    // Auto-login if token exists in session
    if (getToken()) {
      fetch(`${API}/status`, { headers: { 'Authorization': `Bearer ${getToken()}` } })
        .then(res => {
          if (res.ok) showAdmin();
          else { clearToken(); }
        })
        .catch(() => { clearToken(); });
    }

    // ── Toast ─────────────────────────────────────────────
    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `toast ${type}`;
      t.style.display = 'block';
      setTimeout(() => { t.style.display = 'none'; }, 3000);
    }

    // ── Data Loading ──────────────────────────────────────
    async function loadClients() {
      const res = await fetch(`${API}/clients`, { headers: authHeaders() });
      if (res.status === 401) { logout(); return; }
      const { data } = await res.json();
      renderClients(data);
      document.getElementById('totalClients').textContent = data.length;
      document.getElementById('subscriberCount').textContent = data.filter(c => c.plan === 'subscriber').length;
      document.getElementById('vipCount').textContent = data.filter(c => c.plan === 'vip').length;
      document.getElementById('trialCount').textContent = data.filter(c => c.plan === 'free' && !c.freeTrialUsed).length;
    }

    async function loadStatus() {
      const res = await fetch(`${API}/status`, { headers: authHeaders() });
      if (res.status === 401) { logout(); return; }
      const { data } = await res.json();
      const parts = data.schedule.split(' ');
      document.getElementById('scheduleTime').textContent = `${parts[1]}:${parts[0].padStart(2, '0')}`;
      document.getElementById('modelName').textContent = data.model.replace('gpt-', '');
    }

    async function loadOutputs() {
      try {
        const res = await fetch(`${API}/outputs`, { headers: authHeaders() });
        if (res.status === 401) { logout(); return; }
        const { data } = await res.json();
        const el = document.getElementById('outputList');
        if (!data || data.length === 0) {
          el.innerHTML = '<div style="text-align:center;color:#64748b;padding:24px;">暂无历史文案</div>';
          return;
        }
        el.innerHTML = '<div class="output-list">' + data.slice(0, 14).map(output =>
          `<div class="output-item">
        <span class="output-date">📅 ${escapeHtml(output.date)} · ${escapeHtml(output.language.toUpperCase())} · ${escapeHtml(output.market)} · ${escapeHtml(output.audienceProfile || 'general')}</span>
        <a href="/view.html?key=${encodeURIComponent(output.key)}&admin=1" target="_blank" rel="noopener noreferrer">查看文案 ↗</a>
      </div>`
        ).join('') + '</div>';
      } catch (e) { }
    }

    function renderClients(clients) {
      window._cachedClients = clients;
      const visibleClients = clientView === 'all'
        ? clients
        : clients.filter(c => c.active && (c.plan === 'subscriber' || c.plan === 'vip'));
      const subtitle = document.getElementById('clientSubtitle');
      subtitle.textContent = clientView === 'all'
        ? `全部客户视图（${visibleClients.length}/${clients.length}）`
        : `活跃付费/VIP 视图（${visibleClients.length}/${clients.length}）`;

      const el = document.getElementById('clientList');
      if (visibleClients.length === 0) {
        el.innerHTML = `<div class="empty-state"><div class="icon">📭</div><p>${clientView === 'all' ? '暂无客户，在上方输入邮箱快速添加' : '当前筛选下没有活跃付费/VIP 客户'}</p></div>`;
        return;
      }
      const planBadge = (c) => {
        if (c.plan === 'vip') return '<span class="plan-badge vip">👑 VIP</span>';
        if (c.plan === 'subscriber') return '<span class="plan-badge subscriber">💳 付费</span>';
        if (c.freeTrialUsed) return '<span class="plan-badge trial-used">🎁 已体验</span>';
        return '<span class="plan-badge free">🆓 免费</span>';
      };
      const formatDate = (iso) => {
        if (!iso) return '';
        const d = new Date(iso);
        if (Number.isNaN(d.getTime())) return '';
        return d.toLocaleDateString('zh-CN', { month: '2-digit', day: '2-digit' });
      };
      const billingBadge = (c) => {
        if (c.plan === 'vip') return '<span class="billing-badge vip">VIP 手动托管</span>';
        if (c.plan === 'subscriber' && c.active && c.stripeCancelAtPeriodEnd) {
          const until = formatDate(c.stripeCurrentPeriodEnd);
          return `<span class="billing-badge ending">期末取消${until ? `（至 ${until}）` : ''}</span>`;
        }
        if (c.plan === 'subscriber' && c.active) return '<span class="billing-badge active">自动续费中</span>';
        if (!c.active) return '<span class="billing-badge ended">已停用</span>';
        return '<span class="billing-badge free">未付费</span>';
      };
      const markets = ['new-york', 'los-angeles', 'san-francisco', 'chicago', 'miami', 'seattle', 'boston', 'houston'];
      const langSelect = (c) => `<select class="inline-select" onchange="updatePref('${c.id}','language',this.value)">
        <option value="zh" ${c.language === 'zh' ? 'selected' : ''}>🇨🇳 中文</option>
        <option value="en" ${c.language === 'en' ? 'selected' : ''}>🇺🇸 EN</option>
      </select>`;
      const mktSelect = (c) => `<select class="inline-select" onchange="updatePref('${c.id}','market',this.value)">
        ${markets.map(m => `<option value="${m}" ${c.market === m ? 'selected' : ''}>${m}</option>`).join('')}
      </select>`;
      const audienceSelect = (c) => `<select class="inline-select" onchange="updatePref('${c.id}','audienceProfile',this.value)">
        <option value="general" ${c.audienceProfile === 'general' ? 'selected' : ''}>广义北美</option>
        <option value="chinese-community" ${c.audienceProfile === 'chinese-community' ? 'selected' : ''}>华语/搬迁</option>
      </select>`;
      const rows = visibleClients.map(c => `<tr>
    <td><span class="active-dot ${c.active ? 'on' : 'off'}"></span>${escapeHtml(c.name)}</td>
    <td>${escapeHtml(c.email)}</td>
    <td>${planBadge(c)}</td>
    <td>${langSelect(c)}</td>
    <td>${mktSelect(c)}</td>
    <td>${audienceSelect(c)}</td>
    <td>${c.active ? '✅' : '⏸'}</td>
    <td>${billingBadge(c)}</td>
    <td>
      <button class="btn btn-ghost btn-sm" onclick="toggleActive('${c.id}', ${!c.active})">${c.active ? '暂停' : '启用'}</button>
      ${c.plan !== 'vip' ? `<button class="btn btn-vip btn-sm" onclick="setVip('${c.id}')">👑 VIP</button>` : `<button class="btn btn-ghost btn-sm" onclick="removeVip('${c.id}')">取消VIP</button>`}
      <button class="btn btn-danger btn-sm" onclick="deleteClient('${c.id}', ${JSON.stringify(c.name)})">删除</button>
    </td>
  </tr>`).join('');
      el.innerHTML = `<table class="table"><thead><tr><th>名称</th><th>邮箱</th><th>套餐</th><th>语言</th><th>城市</th><th>受众</th><th>状态</th><th>账单状态</th><th>操作</th></tr></thead><tbody>${rows}</tbody></table>`;
    }

    function setClientView(mode) {
      clientView = mode === 'all' ? 'all' : 'active-paid';
      document.getElementById('viewActivePaidBtn').classList.toggle('active', clientView === 'active-paid');
      document.getElementById('viewAllBtn').classList.toggle('active', clientView === 'all');
      renderClients(window._cachedClients || []);
    }

    // ── Admin Actions ─────────────────────────────────────
    async function quickAdd() {
      const input = document.getElementById('quickEmail');
      const email = input.value.trim();
      if (!email) { showToast('请输入邮箱', 'error'); return; }
      try {
        const res = await fetch(`${API}/clients`, { method: 'POST', headers: authHeaders(), body: JSON.stringify({ email }) });
        if (res.status === 401) { logout(); return; }
        const result = await res.json();
        if (!result.success) throw new Error(result.error);
        showToast(`✅ ${email} 已添加`);
        input.value = '';
        loadClients();
      } catch (e) { showToast(e.message, 'error'); }
    }

    async function toggleActive(id, active) {
      try {
        const res = await fetch(`${API}/clients/${id}`, { method: 'PUT', headers: authHeaders(), body: JSON.stringify({ active }) });
        if (res.status === 401) { logout(); return; }
        const result = await res.json();
        if (!result.success) throw new Error(result.error);
        showToast(active ? '客户已启用' : '客户已暂停');
        loadClients();
      } catch (e) { showToast(e.message, 'error'); }
    }

    async function updatePref(id, field, value) {
      try {
        const res = await fetch(`${API}/clients/${id}`, { method: 'PUT', headers: authHeaders(), body: JSON.stringify({ [field]: value }) });
        if (res.status === 401) { logout(); return; }
        const result = await res.json();
        if (!result.success) throw new Error(result.error);
        const label = field === 'language' ? '语言' : field === 'market' ? '城市' : '受众';
        showToast(`✅ 已更新${label}`);
      } catch (e) { showToast(e.message, 'error'); }
    }

    async function deleteClient(id, name) {
      if (!confirm(`确定删除 "${name}" 吗？`)) return;
      try {
        const res = await fetch(`${API}/clients/${id}`, { method: 'DELETE', headers: authHeaders() });
        if (res.status === 401) { logout(); return; }
        const result = await res.json();
        if (!result.success) throw new Error(result.error);
        showToast('已删除');
        loadClients();
      } catch (e) { showToast(e.message, 'error'); }
    }

    async function setVip(id) {
      if (!confirm('确定将该用户设为 VIP（永久免费发送）吗？')) return;
      try {
        const res = await fetch(`${API}/clients/${id}`, { method: 'PUT', headers: authHeaders(), body: JSON.stringify({ plan: 'vip', active: true }) });
        if (res.status === 401) { logout(); return; }
        const result = await res.json();
        if (!result.success) throw new Error(result.error);
        showToast('👑 已设为 VIP');
        loadClients();
      } catch (e) { showToast(e.message, 'error'); }
    }

    async function removeVip(id) {
      if (!confirm('确定取消该用户的 VIP 身份吗？')) return;
      try {
        const res = await fetch(`${API}/clients/${id}`, { method: 'PUT', headers: authHeaders(), body: JSON.stringify({ plan: 'free' }) });
        if (res.status === 401) { logout(); return; }
        const result = await res.json();
        if (!result.success) throw new Error(result.error);
        showToast('已取消 VIP');
        loadClients();
      } catch (e) { showToast(e.message, 'error'); }
    }

    function exportCSV() {
      try {
        const clients = window._cachedClients || [];
        if (!clients.length) { showToast('无数据可导出', 'error'); return; }
        const header = 'Name,Email,Plan,Language,Market,Audience,Active,Created';
        const rows = clients.map(c =>
          [c.name, c.email, c.plan, c.language, c.market, c.audienceProfile || 'general', c.active, c.createdAt].map(v => `"${v}"`).join(',')
        );
        const csv = [header, ...rows].join('\n');
        const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `rescript-clients-${new Date().toISOString().split('T')[0]}.csv`;
        a.click();
        URL.revokeObjectURL(url);
        showToast('📥 CSV 已下载');
      } catch (e) { showToast(e.message, 'error'); }
    }

    async function sendNow() {
      if (!confirm('确认立即向所有活跃客户发送今日文案？')) return;
      try {
        const badge = document.getElementById('statusBadge');
        badge.textContent = '⏳ 生成中...';
        badge.className = 'status-badge running';
        const res = await fetch(`${API}/send-now`, { method: 'POST', headers: authHeaders() });
        if (res.status === 401) { logout(); return; }
        const result = await res.json();
        if (!result.success) throw new Error(result.error);
        showToast('Pipeline 已启动，正在搜索新闻和生成文案...');
        const poll = setInterval(async () => {
          const sr = await fetch(`${API}/status`, { headers: authHeaders() });
          const sd = await sr.json();
          if (!sd.data.isRunning) {
            clearInterval(poll);
            badge.textContent = '● 运行中';
            badge.className = 'status-badge online';
            showToast('✅ 文案生成并发送完成！');
            loadOutputs();
          }
        }, 5000);
      } catch (e) { showToast(e.message, 'error'); }
    }
  </script>
</body>

</html>
